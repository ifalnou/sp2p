name: Release sp2p

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-and-release:
    name: Build and Release for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo Registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Tests
        run: cargo test --release

      - name: Build Release Binary
        run: cargo build --release

      - name: Package Release
        shell: pwsh
        run: |
          mkdir sp2p-release
          Copy-Item .\target\release\sp2p.exe -Destination .\sp2p-release\
          Copy-Item .\ROADMAP.md -Destination .\sp2p-release\
          Compress-Archive -Path .\sp2p-release\* -DestinationPath .\sp2p-windows-x86_64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: sp2p-windows-x86_64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
