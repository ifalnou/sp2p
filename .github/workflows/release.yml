name: Release sp2p

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-and-release:
    name: Build and Release for Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo Registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Tests
        run: cargo test --release

      - name: Build Release Binary
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix --force

      - name: Extract Version
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build MSI Installer
        run: cargo wix --nocapture -v

      - name: Package Release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          mkdir sp2p-release
          Copy-Item .\target\release\sp2p.exe -Destination .\sp2p-release\
          Copy-Item .\ROADMAP.md -Destination .\sp2p-release\
          Compress-Archive -Path .\sp2p-release\* -DestinationPath ".\sp2p-v${ver}-portable.zip" -Force
          Get-ChildItem .\target\wix\*.msi | ForEach-Object { Copy-Item $_.FullName ".\sp2p-v${ver}-setup.msi" -Force }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            sp2p-v${{ steps.version.outputs.VERSION }}-portable.zip
            sp2p-v${{ steps.version.outputs.VERSION }}-setup.msi
          draft: false
          prerelease: false
          generate_release_notes: true
